server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # correct MIME types
    types {
        text/html                   html htm;
        text/css                    css;
        application/javascript      js;
        application/json            json;
        image/svg+xml               svg svgz;
        image/png                   png;
        image/jpeg                  jpg jpeg;
        image/webp                  webp;
        image/x-icon                ico;
        font/woff2                  woff2;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;

    # cache static assets
    location ~* \.(css|js|json|png|jpg|jpeg|webp|svg|ico|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
