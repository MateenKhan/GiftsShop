<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VC Gift World</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header id="header">
  <nav><div class="container">
    <h1 class="logo" id="siteLogo"></h1>
    <ul class="nav-links" id="navLinks"></ul>
  </div></nav>
</header>
<section id="home" class="hero">
  <div class="hero-bg"></div>
  <div class="hero-orb orb-1"></div><div class="hero-orb orb-2"></div><div class="hero-orb orb-3"></div>
  <div class="hero-content">
    <div class="hero-badge" id="heroBadge"></div>
    <h2 class="hero-title" id="heroTitle">
      <span class="line-1" id="heroLine1"></span>
      <span class="line-2" id="heroLine2"></span>
    </h2>
    <p class="hero-sub" id="heroSub"></p>
    <a href="#products" class="hero-cta" id="heroCta"></a>
    <div class="hero-stats" id="heroStats"></div>
  </div>
  <div class="scroll-indicator" id="scrollIndicator"><div class="scroll-line"></div><span>Scroll</span></div>
</section>
<section id="products" class="products">
  <div class="container">
    <div class="products-header">
      <div class="section-label" id="productsLabel"></div>
      <h2 class="section-title" id="productsTitle"></h2>
      <p class="section-sub" id="productsSub"></p>
    </div>
    <div class="products-controls">
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="searchInput" class="search-input" autocomplete="off">
        <button class="search-clear" id="searchClear">&#10005;</button>
      </div>
      <div class="filter-tabs" id="filterTabs"></div>
    </div>
    <p class="no-results" id="noResults"></p>
    <div class="products-grid" id="productsGrid"></div>
  </div>
</section>
<section id="about" class="about">
  <div class="container">
    <div class="about-grid">
      <div class="about-visual" id="aboutVisual">
        <div class="about-card">
          <span class="about-emoji" id="aboutEmoji"></span>
          <div class="about-card-title" id="aboutCardTitle"></div>
          <div class="about-card-text" id="aboutCardText"></div>
          <div class="about-features" id="aboutChips"></div>
        </div>
      </div>
      <div class="about-text-side" id="aboutText">
        <div class="section-label" id="aboutLabel"></div>
        <h2 class="section-title" id="aboutTitle"></h2>
        <p class="section-sub" id="aboutSub"></p>
        <ul class="about-list" id="aboutList"></ul>
      </div>
    </div>
  </div>
</section>
<section id="contact" class="contact">
  <div class="container">
    <div class="contact-header">
      <div class="section-label" id="contactLabel"></div>
      <h2 class="section-title" id="contactTitle"></h2>
    </div>
    <div class="contact-grid">
      <div class="contact-cards" id="contactCards"></div>
      <div class="map-wrap">
        <iframe id="mapEmbed" style="border:0" width="100%" height="360" allowfullscreen loading="lazy"></iframe>
      </div>
    </div>
  </div>
</section>
<footer id="siteFooter">
  <div class="container">
    <p id="footerCopy"></p>
    <p id="footerTagline"></p>
  </div>
</footer>
<script type="module" src="app.js"></script>
</body>
</html>
